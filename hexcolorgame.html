<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What the Hex?</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        body {
            transition: background-color 0.5s ease;
        }
        
        .game-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }
        
        .game-card {
            background: var(--color-primary-white);
            border-radius: var(--border-radius-xl);
            box-shadow: var(--shadow-lg);
            padding: 40px;
            border: 3px solid var(--color-light-orange);
        }
        
        .game-title {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--color-medium-orange), var(--color-accent-teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .game-description {
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 32px;
            opacity: 0.7;
        }
        
        .controls {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 32px;
        }
        
        .hex-display {
            background: linear-gradient(135deg, var(--color-light-orange), rgba(255, 224, 204, 0.5));
            padding: 24px;
            border-radius: var(--border-radius-md);
            font-family: 'Courier New', monospace;
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            color: var(--color-charcoal);
            box-shadow: var(--shadow-inset);
            border: 2px solid rgba(255, 153, 85, 0.4);
            margin-bottom: 32px;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 20px;
            justify-items: center;
            margin-bottom: 32px;
        }
        
        .color-option {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid var(--color-primary-white);
            box-shadow: var(--shadow-md);
            cursor: pointer;
            transition: all var(--transition-normal);
        }
        
        .color-option:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow-lg);
        }
        
        .fade-out {
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s ease;
        }
        
        .result-message {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            min-height: 40px;
        }
        
        .result-correct {
            color: #4CAF50;
        }
        
        .result-incorrect {
            color: #F44336;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <a href="index.html" class="btn-back mb-3">← Back to Portfolio</a>

        <div class="game-card">
            <h1 class="game-title">What the Hex?</h1>
            <p class="game-description">
                Guess which color matches the hex code below.
            </p>

            <div class="controls">
                <select id="difficulty-selector" class="input" style="width: auto; min-width: 200px;">
                    <option value="4">Easy (4 options)</option>
                    <option value="8">Medium (8 options)</option>
                    <option value="16">Hard (16 options)</option>
                </select>
                <button id="restart-button" class="btn btn-primary">
                    Restart Game
                </button>
            </div>

            <div class="hex-display">
                <span id="hex-code-display"></span>
            </div>

            <div id="options-container" class="options-grid"></div>

            <div id="result-message" class="result-message"></div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hexCodeDisplay = document.getElementById('hex-code-display');
            const optionsContainer = document.getElementById('options-container');
            const resultMessage = document.getElementById('result-message');
            const difficultySelector = document.getElementById('difficulty-selector');
            const restartButton = document.getElementById('restart-button');

            let correctAnswer = '';
            let isGameActive = false;

            // Generate a random hex color code
            function generateRandomHex() {
                const hexCharacters = '0123456789ABCDEF';
                let color = '#';
                for (let i = 0; i < 6; i++) {
                    color += hexCharacters[Math.floor(Math.random() * 16)];
                }
                return color;
            }

            // Shuffle an array
            function shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            // Start a new game
            function newGame() {
                isGameActive = true;
                optionsContainer.innerHTML = '';
                resultMessage.textContent = '';
                resultMessage.className = 'result-message';
                document.body.style.backgroundColor = '#F5F7FA';
                
                const numOptions = parseInt(difficultySelector.value);

                correctAnswer = generateRandomHex();
                hexCodeDisplay.textContent = correctAnswer;

                let options = [correctAnswer];
                for (let i = 1; i < numOptions; i++) {
                    let newOption = generateRandomHex();
                    while (options.includes(newOption)) {
                        newOption = generateRandomHex();
                    }
                    options.push(newOption);
                }

                options = shuffleArray(options);

                options.forEach(option => {
                    const button = document.createElement('div');
                    button.style.backgroundColor = option;
                    button.dataset.hex = option;
                    button.className = "color-option";
                    button.addEventListener('click', (event) => handleGuess(event, option));
                    optionsContainer.appendChild(button);
                });
            }

            // Handle the user's guess
            function handleGuess(event, guess) {
                if (!isGameActive) {
                    return;
                }
                
                if (guess === correctAnswer) {
                    isGameActive = false;
                    resultMessage.textContent = 'Correct! 🎉';
                    resultMessage.className = 'result-message result-correct';
                    document.body.style.backgroundColor = correctAnswer;
                    
                    const allOptions = optionsContainer.children;
                    const correctButton = event.target;

                    // Fade out incorrect options
                    for (const option of allOptions) {
                        if (option !== correctButton) {
                            option.classList.add('fade-out');
                        }
                    }
                } else {
                    resultMessage.innerHTML = `Incorrect. That color is: <span style="color: ${guess}">${guess}</span>`;
                    resultMessage.className = 'result-message result-incorrect';
                    event.target.classList.add('fade-out');
                }
            }

            // Event listeners
            difficultySelector.addEventListener('change', newGame);
            restartButton.addEventListener('click', newGame);

            // Initial game start
            newGame();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Board</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        .messageboard-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }
        
        .board-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .board-title {
            font-size: 2.5rem;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--color-medium-orange), var(--color-accent-teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .board-description {
            color: var(--color-charcoal);
            opacity: 0.7;
            margin-bottom: 16px;
        }
        
        .user-info {
            display: inline-block;
            padding: 8px 16px;
            background: var(--color-light-orange);
            color: var(--color-charcoal);
            border-radius: var(--border-radius-md);
            font-family: monospace;
            font-size: 0.9rem;
            box-shadow: var(--shadow-sm);
        }
        
        .message-form-card {
            background: var(--color-primary-white);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-md);
            padding: 32px;
            margin-bottom: 32px;
            border: 2px solid var(--color-light-orange);
        }
        
        .form-title {
            font-size: 1.5rem;
            color: var(--color-medium-orange);
            margin-bottom: 20px;
        }
        
        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .messages-card {
            background: var(--color-primary-white);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-md);
            padding: 32px;
            border: 2px solid var(--color-light-orange);
        }
        
        .messages-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .messages-title {
            font-size: 1.5rem;
            color: var(--color-medium-orange);
        }
        
        .btn-delete-all {
            padding: 10px 20px;
            background: linear-gradient(135deg, #F44336, #E57373);
            color: white;
            border: none;
            border-radius: var(--border-radius-md);
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-normal);
        }
        
        .btn-delete-all:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .btn-delete-all:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        #messages-container {
            max-height: 50vh;
            overflow-y: auto;
            padding: 8px;
        }
        
        #messages-container::-webkit-scrollbar {
            width: 8px;
        }
        
        #messages-container::-webkit-scrollbar-thumb {
            background: var(--color-medium-orange);
            border-radius: 4px;
        }
        
        #messages-container::-webkit-scrollbar-track {
            background: var(--color-light-orange);
        }
        
        .message-item {
            background: var(--color-primary-white);
            border-radius: var(--border-radius-md);
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(255, 153, 85, 0.24);
            border-left: 4px solid var(--color-medium-orange);
        }

        .message-text {
            color: var(--color-charcoal);
            font-size: 1rem;
            line-height: 1.55;
            margin: 0;
            word-break: break-word;
        }

        .message-meta {
            margin-top: 10px;
            font-size: 0.78rem;
            font-weight: 600;
            color: rgba(44, 62, 80, 0.72);
        }

        .message-item.current-user {
            background: rgba(11, 130, 174, 0.08);
            border-left-color: var(--color-accent-teal);
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(44, 62, 80, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: var(--color-primary-white);
            padding: 32px;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-lg);
            max-width: 400px;
            width: 90%;
            border: 3px solid var(--color-light-orange);
        }
        
        .modal-title {
            font-size: 1.5rem;
            color: #F44336;
            margin-bottom: 16px;
        }
        
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 20px;
        }
        
        .hidden {
            display: none;
        }
        
        .error-message {
            color: #F44336;
            font-weight: 500;
            margin-top: 12px;
        }
        
        .loading-text {
            text-align: center;
            color: var(--color-charcoal);
            opacity: 0.5;
            padding: 20px;
        }
    </style>
</head>

<body>
    <div class="messageboard-container">
        <a href="index.html" class="btn-back mb-3">← Back to Portfolio</a>
        
        <header class="board-header">
            <h1 class="board-title">PH Message Board</h1>
            <p class="board-description">Post any message. Posted in a "global" chat that anyone can see.</p>
            <div id="user-info" class="user-info">
                Connecting anonymously...
            </div>
        </header>

        <!-- Message Posting Form -->
        <div class="message-form-card">
            <h2 class="form-title">Send a Message</h2>
            <form id="message-form">
                <div class="form-row">
                    <input
                        type="text"
                        id="user-name-input"
                        placeholder="Your Name (Optional)"
                        maxlength="50"
                        class="input"
                        style="flex: 1; min-width: 200px;"
                    />
                </div>

                <div class="form-row">
                    <input
                        type="text"
                        id="message-input"
                        placeholder="Type your message here..."
                        maxlength="200"
                        class="input"
                        style="flex: 1;"
                        required
                    />
                    <button
                        type="submit"
                        id="post-button"
                        class="btn btn-primary"
                        disabled
                    >
                        Post Message
                    </button>
                </div>
            </form>
            <p id="error-message" class="error-message hidden"></p>
        </div>

        <!-- Message Display Area -->
        <div class="messages-card">
            <div class="messages-header">
                <h2 class="messages-title">Live Feed</h2>
                <button
                    id="delete-all-button"
                    class="btn-delete-all"
                    disabled
                >
                    Delete All Messages
                </button>
            </div>
            
            <div id="messages-container">
                <p id="loading-indicator" class="loading-text">Loading messages...</p>
            </div>
        </div>
    </div>

    <!-- ADMIN Password Prompt Modal -->
    <div id="password-prompt-overlay" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 class="modal-title">Administrator Action Required</h3>
            <p id="prompt-message" style="color: var(--color-charcoal); margin-bottom: 16px;">Enter administrator password to confirm deletion.</p>
            <input
                type="password"
                id="delete-password-input"
                placeholder="Enter password"
                class="input"
            />
            <div class="modal-buttons">
                <button
                    id="cancel-delete-button"
                    class="btn btn-secondary"
                >
                    Cancel
                </button>
                <button
                    id="confirm-delete-button"
                    class="btn-delete-all"
                >
                    Confirm Deletion
                </button>
            </div>
        </div>
    </div>
    <!-- END: ADMIN Password Prompt Modal -->
    
    <!-- Firebase SDK Imports -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        // Simplified Auth imports for Anonymous Sign-In
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, query, onSnapshot, addDoc, serverTimestamp, setLogLevel, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Set Firebase logging level to Debug for visibility
        setLogLevel('Debug');

        // --- Global Variables ---
        const ADMIN_PASSWORD = "anderson=thief"; 

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        
        // Default Firebase Config (Replaced by environment variable if available)
        let firebaseConfig = {
            apiKey: "AIzaSyCMCOknNRhflfejnBj2aIyK3k7Hof_3WZI", 
            authDomain: "phhs-message-board-70872.firebaseapp.com",
            projectId: "phhs-message-board-70872",
            storageBucket: "phhs-message-board-70872.firebasestorage.app",
            messagingSenderId: "213866179681",
            appId: "1:213866179681:web:053f529ad51fcafcf98e20",
            measurementId: "G-Z9YSY70NY8"
        };        
        
        // Initial token is no longer used for sign-in, but kept for compatibility checks
        // const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null; 
        
        if (typeof __firebase_config === 'string' && __firebase_config.length > 2) {
            try {
                firebaseConfig = JSON.parse(__firebase_config);
            } catch (e) {
                console.error("Configuration Parse Error: Could not parse __firebase_config JSON.", e);
            }
        }

        let db = null;
        let auth = null;
        let currentUserId = null;
        let isAuthReady = false;

        // --- DOM Elements ---
        const messagesContainer = document.getElementById('messages-container');
        const messageForm = document.getElementById('message-form');
        const userNameInput = document.getElementById('user-name-input');
        const messageInput = document.getElementById('message-input');
        const postButton = document.getElementById('post-button');
        const userInfoDisplay = document.getElementById('user-info');
        const errorMessageDisplay = document.getElementById('error-message');
        const loadingIndicator = document.getElementById('loading-indicator');
        // Removed signOutButton
        
        // Delete elements
        const deleteAllButton = document.getElementById('delete-all-button');
        const passwordPromptOverlay = document.getElementById('password-prompt-overlay');
        const deletePasswordInput = document.getElementById('delete-password-input');
        const confirmDeleteButton = document.getElementById('confirm-delete-button');
        const cancelDeleteButton = document.getElementById('cancel-delete-button');
        const promptMessage = document.getElementById('prompt-message');
        
        // Removed all Auth elements


        // --- Utility Functions ---

        function formatTimestamp(timestamp) {
            if (timestamp && timestamp.toDate) {
                return timestamp.toDate().toLocaleTimeString('en-US', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
            }
            return 'Just now';
        }
        
        function showCustomAlert(message, isError = false) {
            errorMessageDisplay.textContent = message;
            errorMessageDisplay.classList.remove('hidden');
            if (isError) {
                 errorMessageDisplay.classList.add('text-red-500');
            } else {
                 errorMessageDisplay.classList.remove('text-red-500');
            }
            setTimeout(() => {
                errorMessageDisplay.classList.add('hidden');
            }, 5000);
        }

        // --- Firebase Initialization and Anonymous Authentication ---

        async function initializeFirebase() {
            try {
                if (Object.keys(firebaseConfig).length === 0 || !firebaseConfig.apiKey) {
                    const message = "Initialization failed: Firebase Configuration (API Key) is missing or invalid.";
                    console.error(message, firebaseConfig);
                    userInfoDisplay.textContent = 'Config Error: Cannot Connect.';
                    showCustomAlert(message, true);
                    return;
                }
                
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                // Sign in anonymously immediately to satisfy security rules and get a unique ID
                const userCredential = await signInAnonymously(auth);
                const user = userCredential.user;

                currentUserId = user.uid;
                
                userInfoDisplay.textContent = `Posting Anonymously (ID: ${user.uid.substring(0, 8)}...)`;
                
                postButton.disabled = false;
                deleteAllButton.disabled = false;
                
                isAuthReady = true;
                loadMessages();

            } catch (error) {
                console.error("Anonymous Sign-in Error:", error);
                userInfoDisplay.textContent = 'Error connecting. Cannot post.';
                postButton.disabled = true;
                showCustomAlert(`Initialization failed: ${error.message}`, true);
            }
        }

        // --- Delete Functionality ---

        function showDeletePrompt() {
            passwordPromptOverlay.classList.remove('hidden'); 
            deletePasswordInput.value = ''; 
            promptMessage.textContent = "Enter administrator password to confirm deletion.";
            confirmDeleteButton.disabled = false;
            cancelDeleteButton.disabled = false;
        }

        function hideDeletePrompt() {
            passwordPromptOverlay.classList.add('hidden');
        }

        async function clearCollection(collectionPath) {
            if (!db) throw new Error("Database not initialized.");
            const q = query(collection(db, collectionPath));
            const snapshot = await getDocs(q);
            if (snapshot.empty) return 0; 
            
            let count = 0;
            const deletePromises = [];
            
            snapshot.docs.forEach((docRef) => {
                deletePromises.push(deleteDoc(docRef.ref).then(() => {
                    count++;
                }));
            });

            await Promise.all(deletePromises);
            return count;
        }

        async function handleDeleteAll() {
            const enteredPassword = deletePasswordInput.value;

            if (enteredPassword !== ADMIN_PASSWORD) {
                promptMessage.textContent = "Incorrect password. Try again.";
                deletePasswordInput.value = '';
                return;
            }

            promptMessage.textContent = "Deleting all messages...";
            confirmDeleteButton.disabled = true;
            cancelDeleteButton.disabled = true;

            const collectionPath = `/artifacts/${appId}/public/data/messages`;

            try {
                const deletedCount = await clearCollection(collectionPath);
                
                promptMessage.textContent = `${deletedCount} messages deleted successfully!`;
                setTimeout(hideDeletePrompt, 3000);

            } catch (error) {
                promptMessage.textContent = `Deletion failed: ${error.message}`;
                console.error("Collection deletion error:", error);
            } finally {
                confirmDeleteButton.disabled = false;
                cancelDeleteButton.disabled = false;
            }
        }

        // --- Message Posting ---

        async function postMessage(event) {
            event.preventDefault();
            if (!isAuthReady || !currentUserId) {
                showCustomAlert("Connection not ready. Cannot post messages.", true);
                return;
            }
            
            const content = messageInput.value.trim();
            
            // Get user name from input field, defaulting to an anonymous ID if empty
            const rawUserName = userNameInput.value.trim();
            const userName = rawUserName || `Anonymous-${currentUserId.substring(0, 4)}`;

            if (content === "") {
                showCustomAlert("Please enter a message.", true);
                return;
            }

            postButton.disabled = true;
            postButton.textContent = "Posting...";

            const messageData = {
                userId: currentUserId, // Used for identifying the author (and security rules)
                userName: userName,    // Used for display
                content: content,
                timestamp: serverTimestamp() 
            };

            const collectionPath = `/artifacts/${appId}/public/data/messages`;
            
            try {
                await addDoc(collection(db, collectionPath), messageData);
                messageInput.value = '';
                // The userNameInput intentionally keeps the user's name value
            } catch (error) {
                console.error("Error writing document: ", error);
                showCustomAlert(`Post failed: ${error.message}`, true);
            } finally {
                postButton.disabled = false;
                postButton.textContent = "Post Message";
            }
        }

        // --- Load and Listen for Messages ---
        function loadMessages() {
            if (!db || !isAuthReady) return;

            const collectionPath = `/artifacts/${appId}/public/data/messages`;
            const q = query(collection(db, collectionPath));

            onSnapshot(q, (snapshot) => {
                loadingIndicator.classList.add('hidden');
                
                let messages = [];
                snapshot.forEach((doc) => {
                    messages.push({ id: doc.id, ...doc.data() });
                });

                // Manually sort messages by timestamp in descending order (newest first)
                messages.sort((a, b) => {
                    const timeA = a.timestamp?.toDate()?.getTime() || 0;
                    const timeB = b.timestamp?.toDate()?.getTime() || 0;
                    return timeB - timeA;
                });

                messagesContainer.innerHTML = '';

                if (messages.length === 0) {
                    messagesContainer.innerHTML = '<p class="text-center text-gray-400 p-4">The board is empty. Be the first to post!</p>';
                    return;
                }

                messages.forEach(msg => {
                    const isCurrentUser = msg.userId === currentUserId;
                    const messageElement = document.createElement('div');
                    
                    const displayName = msg.userName || (isCurrentUser ? 'You' : msg.userId.substring(0, 8) + '...');

                    messageElement.className = `message-item ${isCurrentUser ? 'current-user' : ''}`;

                    messageElement.innerHTML = `
                        <p class="message-text">${msg.content}</p>
                        <div class="message-meta">
                            ${displayName} at ${formatTimestamp(msg.timestamp)}
                        </div>
                    `;
                    messagesContainer.appendChild(messageElement);
                });

                messagesContainer.scrollTop = 0;

            }, (error) => {
                console.error("Error listening to collection: ", error);
                loadingIndicator.classList.add('hidden');
                showCustomAlert(`Real-time updates failed: ${error.message}`, true);
            });
        }

        // --- Event Listeners and Initialization ---
        messageForm.addEventListener('submit', postMessage);
        
        if (deleteAllButton) {
            deleteAllButton.addEventListener('click', showDeletePrompt);
        }
        if (confirmDeleteButton) {
            confirmDeleteButton.addEventListener('click', handleDeleteAll);
        }
        if (cancelDeleteButton) {
            cancelDeleteButton.addEventListener('click', hideDeletePrompt);
        }

        window.onload = initializeFirebase;

    </script>
</body>
</html>
